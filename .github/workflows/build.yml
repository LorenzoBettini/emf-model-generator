name: Build and Test

on:
  push:
    branches: [ '**' ]
    paths-ignore:
      - '**.md'
      - '**.tex'
      - 'MODELSWARD-article/**'
  pull_request:
    branches: [ '**' ]
    paths-ignore:
      - '**.md'
      - '**.tex'
      - 'MODELSWARD-article/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
    
    - name: Build with Maven (with JaCoCo)
      run: ./mvnw -P jacoco package
    
    - name: Generate JaCoCo Report
      run: ./mvnw -P jacoco jacoco:report
      if: always()
    
    - name: Upload JaCoCo coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: false
        token: ${{ secrets.CODECOV_TOKEN }}
      if: always()
    
    - name: Archive Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/
      if: always()
    
    - name: Archive JaCoCo Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/
      if: always()

    - name: Run Mutation Testing
      run: ./mvnw org.pitest:pitest-maven:mutationCoverage -Dpit-timeout-const=1000

    - name: Archive Mutation Testing Report
      uses: actions/upload-artifact@v4
      with:
        name: mutation-testing-report
        path: target/pit-reports/
      if: always()