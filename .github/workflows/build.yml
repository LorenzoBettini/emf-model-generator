name: Build and Test

on:
  push:
    branches: [ '**' ]
    paths-ignore:
      - '**.md'
      - '**.tex'
  pull_request:
    branches: [ '**' ]
    paths-ignore:
      - '**.md'
      - '**.tex'

jobs:
  build:
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.m2
          ~/.sonar/cache
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    # execute sonar:sonar only for internal PRs
    - name: Set Maven Additional Goals
      run: |
        echo "SONARGOAL=sonar:sonar" >> $GITHUB_ENV
      if: ${{ env.SONAR_TOKEN }}

    - name: Build with Maven (with JaCoCo and SonarCloud)
      run: >
        ./mvnw -P jacoco verify
        -Dsonar.organization=lorenzobettini-github
        -Dsonar.host.url=https://sonarcloud.io
        -Dsonar.projectKey=LorenzoBettini_emf-model-generator
        $SONARGOAL
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload JaCoCo coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: false
        token: ${{ secrets.CODECOV_TOKEN }}
      if: always()
    
    - name: Archive Test Results
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: target/surefire-reports/
      if: always()
    
    - name: Archive JaCoCo Report
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-report
        path: target/site/jacoco/
      if: always()

    - name: Run Mutation Testing
      run: ./mvnw org.pitest:pitest-maven:mutationCoverage -Dpit-timeout-const=1000

    - name: Archive Mutation Testing Report
      uses: actions/upload-artifact@v7
      with:
        name: mutation-testing-report
        path: target/pit-reports/
      if: always()