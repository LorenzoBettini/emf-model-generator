services:
  sonarqube:
    image: sonarqube:25.11.0.114957-community
    hostname: sonarqube
    container_name: sonarqube
    read_only: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
      - sonarqube_bootstrap:/bootstrap   # shared volume (token lives here)
    ports:
      - "9000:9000"
    networks:
      - ${NETWORK_TYPE:-ipv4}
    ulimits:
      nofile:
        soft: "262144"
        hard: "262144"

  db:
    image: postgres:17
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    hostname: postgresql
    container_name: postgresql
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql:/var/lib/postgresql
    networks:
      - ${NETWORK_TYPE:-ipv4}

  sonarqube-bootstrap:
    image: alpine:3.20
    container_name: sonarqube-bootstrap
    depends_on:
      sonarqube:
        condition: service_started
    networks:
      - ${NETWORK_TYPE:-ipv4}
    volumes:
      - sonarqube_bootstrap:/bootstrap
      - ./bootstrap-sonar.sh:/bootstrap/bootstrap-sonar.sh:ro
    environment:
      # SonarQube endpoint reachable from this container
      SONAR_HOST_URL: http://sonarqube:9000

      # Admin credentials (change if you've already changed the default)
      SONARQUBE_ADMIN_USER: admin
      SONARQUBE_ADMIN_PASSWORD: admin

      # Predefined user
      BOOTSTRAP_USER_LOGIN: user
      BOOTSTRAP_USER_PASSWORD: userpass
      BOOTSTRAP_USER_NAME: "Predefined User"

      # Name for the generated token
      BOOTSTRAP_TOKEN_NAME: "predefined-ci-token"
    entrypoint:
      - sh
      - /bootstrap/bootstrap-sonar.sh

volumes:
  sonarqube_data:
  sonarqube_temp:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:
  postgresql_data:
  sonarqube_bootstrap:

networks:
  ipv4:
    driver: bridge
    enable_ipv6: false
  dual:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "192.168.2.0/24"
          gateway: "192.168.2.1"
        - subnet: "2001:db8:2::/64"
          gateway: "2001:db8:2::1"
